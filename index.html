<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
</head>
<body>

<h2>AI Chatbot</h2>

<form method="POST">
    <input type="text" name="message" placeholder="Type your message">
    <button type="submit">Send</button>
</form>

{% if user_message %}
<p><b>You:</b> {{ user_message }}</p>
<p><b>Bot:</b> {{ bot_response }}</p>
{% endif %}

</body>
</html>
